<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Notes App with Pagination</title>
    <meta name="description" content="A simple, straightforward vanilla HTML/JS notes application with Tailwind CSS, pagination, and localStorage persistence.">
    <!-- Tailwind CSS v3 Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-md p-6 md:p-8">
        <!-- Header -->
        <header class="text-center mb-8 pb-6 border-b border-slate-100">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Simple Notes App</h1>
            <p class="text-slate-500">Keep track of your thoughts with local storage & pagination.</p>
        </header>

        <!-- Main Content Area -->
        <main class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Left Side: Add Note Form -->
            <section class="bg-slate-50 border border-slate-200 rounded-lg p-6 h-fit">
                <h2 class="text-xl font-bold text-slate-850 mb-4">Create a New Note</h2>
                <form id="note-form" class="space-y-4">
                    <div>
                        <label for="note-title" class="block text-sm font-semibold text-slate-700 mb-1">Note Title (Optional)</label>
                        <input type="text" id="note-title" placeholder="e.g., Shopping List" 
                            class="w-full px-3 py-2 border border-slate-350 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                    </div>
                    <div>
                        <label for="note-content" class="block text-sm font-semibold text-slate-700 mb-1">Note Content</label>
                        <textarea id="note-content" placeholder="Type your note here..." required rows="5" 
                            class="w-full px-3 py-2 border border-slate-350 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"></textarea>
                    </div>
                    <button type="submit" id="save-button" 
                        class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2.5 px-4 rounded-md transition duration-150">
                        Save Note
                    </button>
                </form>
            </section>

            <!-- Right Side: Notes Display -->
            <section class="flex flex-col justify-between">
                <div>
                    <h2 class="text-xl font-bold text-slate-850 mb-4">Your Notes</h2>
                    <div id="notes-container" class="space-y-4 min-h-[300px]">
                        <!-- Notes will be loaded here dynamically -->
                    </div>
                </div>

                <!-- Pagination Section -->
                <div class="flex justify-between items-center mt-6 pt-4 border-t border-slate-100">
                    <button id="prev-button" 
                        class="px-4 py-2 border border-slate-300 rounded bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold transition disabled:opacity-50 disabled:cursor-not-allowed">
                        Previous
                    </button>
                    <span id="page-indicator" class="text-sm font-semibold text-slate-500">
                        Page 1 of 1
                    </span>
                    <button id="next-button" 
                        class="px-4 py-2 border border-slate-300 rounded bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold transition disabled:opacity-50 disabled:cursor-not-allowed">
                        Next
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Script file -->
    <script src="app.js"></script>
</body>
</html>
